<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Research pipeline</title>
  <desc>Three-step pipeline: verify_caste_bias_2b.py probes the model, zedxcombine.py combines results, heat.py renders the heatmap.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="280" fill="#ffffff"/>

  <!-- Step 1 -->
  <rect x="40" y="70" width="230" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="155" y="102" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">verify_caste_bias_2b.py</text>
  <text x="155" y="124" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489" text-anchor="middle">Probe model via</text>
  <text x="155" y="140" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489" text-anchor="middle">Neuronpedia API</text>

  <!-- Step 2 -->
  <rect x="335" y="70" width="230" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="450" y="102" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">zedxcombine.py</text>
  <text x="450" y="124" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#085041" text-anchor="middle">Merge per-name and</text>
  <text x="450" y="140" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#085041" text-anchor="middle">per-model CSVs</text>

  <!-- Step 3 -->
  <rect x="630" y="70" width="230" height="90" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="745" y="102" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#4A1B0C" text-anchor="middle">heat.py</text>
  <text x="745" y="124" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#712B13" text-anchor="middle">Render bias heatmap</text>
  <text x="745" y="140" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#712B13" text-anchor="middle">as PNG</text>

  <!-- Arrows -->
  <line x1="270" y1="115" x2="330" y2="115" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="565" y1="115" x2="625" y2="115" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Input / output annotations -->
  <text x="155" y="195" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle">Input: first name + surname list</text>
  <text x="450" y="195" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle">Output: Combined_caste_bias_verify.csv</text>
  <text x="745" y="195" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle">Output: Occupation_PrestigeHeatmap.png</text>
</svg>
